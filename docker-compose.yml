# =============================================
# EPCO - Docker Compose
# Servicios: Apache/PHP + MySQL + phpMyAdmin
#
# Los puertos se configuran via .env
# Usar: bash start.sh (auto-detecta puertos libres)
# O manualmente: docker compose up -d
# =============================================

services:
  # =============================================
  # Aplicación PHP/Apache
  # =============================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: epco-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./logs:/var/www/html/logs
      - ./public/uploads:/var/www/html/public/uploads
    environment:
      - DB_HOST=db
      - DB_NAME=${DB_NAME:-epco}
      - DB_USER=${DB_USER:-epco_user}
      - DB_PASS=${DB_PASS:-EpcoSecure2026}
      - DB_CHARSET=utf8mb4
      - APP_ENV=${APP_ENV:-production}
      - APP_URL=${APP_URL:-http://localhost:8080}
      - TZ=America/Santiago
      # SMTP - Configuración de correo
      - SMTP_ENABLED=${SMTP_ENABLED:-false}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_ENCRYPTION=${SMTP_ENCRYPTION:-tls}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME:-Soporte TI - EPCO}
      # Destinatarios de notificaciones (separar con coma)
      - NOTIFY_TICKET_CREATED=${NOTIFY_TICKET_CREATED:-}
      - NOTIFY_TICKET_UPDATED=${NOTIFY_TICKET_UPDATED:-}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - epco-network

  # =============================================
  # Base de Datos MySQL
  # =============================================
  db:
    build:
      context: .
      dockerfile: Dockerfile.mysql
    image: epco-db:latest
    container_name: epco-db
    restart: unless-stopped
    ports:
      - "${DB_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-EpcoRoot2026}
      MYSQL_DATABASE: ${DB_NAME:-epco}
      MYSQL_USER: ${DB_USER:-epco_user}
      MYSQL_PASSWORD: ${DB_PASS:-EpcoSecure2026}
      TZ: America/Santiago
    volumes:
      - epco-db-data:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "bash", "-c", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD} --silent && mysql -u root -p$${MYSQL_ROOT_PASSWORD} -e 'SELECT 1 FROM epco.users LIMIT 1' 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - epco-network

  # =============================================
  # phpMyAdmin (opcional, para administrar la BD)
  # =============================================
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: epco-phpmyadmin
    restart: unless-stopped
    ports:
      - "${PMA_PORT:-8081}:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-EpcoRoot2026}
      UPLOAD_LIMIT: 64M
    depends_on:
      db:
        condition: service_healthy
    networks:
      - epco-network

# =============================================
# Volúmenes persistentes
# =============================================
volumes:
  epco-db-data:
    driver: local

# =============================================
# Red interna
# =============================================
networks:
  epco-network:
    driver: bridge
