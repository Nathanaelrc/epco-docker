<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empresa Portuaria Coquimbo - Sin Conexión</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Lato', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        h1, h2, h3, h4, h5, h6, .fw-bold, .fw-semibold, .btn, .badge { font-family: 'Montserrat', sans-serif; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0ea5e9, #0284c7);
            color: white;
            text-align: center;
            padding: 20px;
        }
        .offline-container {
            max-width: 400px;
        }
        .offline-icon {
            width: 120px;
            height: 120px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }
        .offline-icon svg {
            width: 60px;
            height: 60px;
            fill: white;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 15px;
        }
        p {
            opacity: 0.8;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .retry-btn {
            display: inline-block;
            padding: 15px 40px;
            background: white;
            color: #0ea5e9;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .retry-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .tips {
            margin-top: 40px;
            padding-top: 40px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .tips h3 {
            font-size: 1rem;
            margin-bottom: 15px;
            opacity: 0.7;
        }
        .tips ul {
            list-style: none;
            text-align: left;
            opacity: 0.6;
            font-size: 0.9rem;
        }
        .tips li {
            padding: 5px 0;
        }
        .tips li::before {
            content: '•';
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M23.64 7c-.45-.34-4.93-4-11.64-4-1.5 0-2.89.19-4.15.48L18.18 13.8 23.64 7zm-6.6 8.22L3.27 1.44 2 2.72l2.05 2.06C1.91 5.76.59 6.82.36 7L12 21.5l3.07-3.9-.03-.04z"/>
            </svg>
        </div>
        <h1>Sin Conexión</h1>
        <p>Parece que no tienes conexión a internet. Verifica tu conexión e intenta nuevamente.</p>
        <a href="javascript:location.reload()" class="retry-btn">
            Reintentar
        </a>
        
        <div class="tips">
            <h3>Mientras tanto puedes:</h3>
            <ul>
                <li>Verificar tu conexión Wi-Fi</li>
                <li>Comprobar tus datos móviles</li>
                <li>Reiniciar tu router</li>
                <li>Contactar a soporte TI si el problema persiste</li>
            </ul>
        </div>
    </div>
    
    <script>
        // Detectar cuando vuelve la conexión
        window.addEventListener('online', function() {
            location.reload();
        });
    </script>
</body>
</html>
